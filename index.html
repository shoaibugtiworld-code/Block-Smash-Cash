<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Smash Cash - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #0a0a1a;
            font-family: 'Segoe UI', system-ui, Arial, sans-serif;
            color: #fff;
        }
        #app {
            max-width: 420px;
            width: 100%;
            height: 100dvh;
            max-height: 100dvh;
            margin: 0 auto;
            background: #12122a;
            border-radius: 0;
            padding: 16px 16px 8px;
            border: 1px solid #2a2a5a;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        @media (min-width: 421px) {
            #app {
                border-radius: 24px;
                height: 90vh;
                max-height: 740px;
                margin-top: 20px;
            }
        }
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            display: flex;
            flex-direction: column;
        }
        .content-area::-webkit-scrollbar { width: 3px; }
        .content-area::-webkit-scrollbar-thumb { background: #2a2a5a; border-radius: 10px; }

        .header { text-align: center; padding: 6px 0 8px; flex-shrink: 0; }
        .header .logo { font-size: 48px; }
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #00ddff;
            text-shadow: 0 0 30px rgba(0, 221, 255, 0.25);
            letter-spacing: 1px;
        }
        .header .tagline {
            color: #ffd700;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .play-btn-main {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #00ddff, #0088ff);
            color: #fff;
            cursor: pointer;
            margin: 10px 0 10px;
            box-shadow: 0 8px 35px rgba(0, 136, 255, 0.35);
            transition: transform 0.15s;
            text-align: center;
            flex-shrink: 0;
        }
        .play-btn-main:active { transform: scale(0.96); }
        .play-btn-main .sub {
            font-size: 13px;
            font-weight: 400;
            opacity: 0.85;
            display: block;
            margin-top: 2px;
        }

        .home-stats {
            display: flex;
            justify-content: space-around;
            background: #1a1a3a;
            border-radius: 14px;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #2a2a5a;
            flex-shrink: 0;
        }
        .home-stats .stat { text-align: center; }
        .home-stats .stat .num { font-size: 18px; font-weight: 700; color: #ffd700; }
        .home-stats .stat .lbl { font-size: 9px; color: #8888bb; text-transform: uppercase; }

        .phase-box {
            background: linear-gradient(135deg, #1a2a1a, #0a1a0a);
            border: 1px solid #33aa55;
            border-radius: 14px;
            padding: 12px 14px;
            margin: 8px 0;
            text-align: center;
            flex-shrink: 0;
        }
        .phase-box .phase-title { color: #66ff88; font-weight: 700; font-size: 15px; }
        .phase-box .phase-desc { color: #aaa; font-size: 12px; margin-top: 2px; }
        .phase-box .phase-date { color: #ffd700; font-size: 12px; margin-top: 2px; }
        .phase-box .phase-arrow {
            color: #66ff88;
            font-size: 12px;
            font-weight: 600;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .home-features {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin: 8px 0;
            flex-shrink: 0;
        }
        .home-features .f {
            background: #1a1a3a;
            border-radius: 10px;
            padding: 8px 4px;
            text-align: center;
            border: 1px solid #2a2a5a;
        }
        .home-features .f .icon { font-size: 20px; }
        .home-features .f .label { font-size: 10px; color: #aaa; margin-top: 2px; }

        .pool-update-note {
            font-size: 10px;
            color: #66ff88;
            text-align: center;
            margin: 4px 0 6px;
            opacity: 0.7;
            flex-shrink: 0;
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: #1a1a3a;
            border-radius: 16px;
            padding: 6px 2px;
            margin-top: 8px;
            border: 1px solid #2a2a5a;
            flex-shrink: 0;
            width: 100%;
            overflow-x: auto;
            gap: 2px;
        }
        .bottom-nav a {
            background: none;
            border: none;
            color: #8888bb;
            font-size: 10px;
            padding: 4px 6px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            min-width: 40px;
            flex-shrink: 0;
        }
        .bottom-nav a .icon { font-size: 18px; line-height: 1; }
        .bottom-nav a.active {
            color: #00ddff;
            background: rgba(0, 221, 255, 0.08);
        }
        .bottom-nav a:active { transform: scale(0.94); }
    </style>
</head>
<body>
<div id="app">
    <div class="content-area">
        <div class="header">
            <div class="logo">💵</div>
            <h1>BLOCK SMASH CASH</h1>
            <div class="tagline">💰 Play · Earn · Win</div>
        </div>

        <button class="play-btn-main" id="homePlayBtn">
            ▶ PLAY NOW
            <span class="sub">Smash blocks &amp; earn real cash</span>
        </button>

        <div class="home-stats">
            <div class="stat"><div class="num" id="homePlayers">0</div><div class="lbl">Players</div></div>
            <div class="stat"><div class="num" id="homePool">₨ 0</div><div class="lbl">Prize Pool</div></div>
            <div class="stat"><div class="num" id="homeWinners">0</div><div class="lbl">Winners</div></div>
        </div>

        <div class="phase-box">
            <div class="phase-title" id="phaseTitle">🏆 Phase 1 – 100 Winners</div>
            <div class="phase-desc" id="phaseDesc">Next: 150 Winners</div>
            <div class="phase-date" id="phaseDate">📅 Next Withdrawal: 30 July 2026</div>
            <div class="phase-arrow" id="phaseArrow">➡️ 100 ➜ 150 ➜ 200 ➜ 250 ➜ 500</div>
        </div>

        <div class="home-features">
            <div class="f"><div class="icon">🟢</div><div class="label">Easy</div></div>
            <div class="f"><div class="icon">🟡</div><div class="label">Normal</div></div>
            <div class="f"><div class="icon">🔴</div><div class="label">Hard</div></div>
        </div>

        <div class="pool-update-note">🔄 Prize pool updates every 12 hours</div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="active">🏠<span>Home</span></a>
        <a href="leaderboard.html">🏆<span>Top</span></a>
        <a href="profile.html">👤<span>Profile</span></a>
        <a href="referral.html">🔗<span>Referral</span></a>
        <a href="admin.html" id="adminNavLink" style="display:none;">⚙️<span>Admin</span></a>
    </div>
</div>
<script>
    function getUsers() {
        try { return JSON.parse(localStorage.getItem('bs_users')) || []; } catch(e) { return []; }
    }
    function getPool() {
        return parseFloat(localStorage.getItem('bs_current_pool')) || 45230;
    }
    function getAdLink(key) {
        return localStorage.getItem(key) || '';
    }

    function getPhase(count) {
        const phases = [100, 150, 200, 250, 500];
        let idx = 0;
        for (let i = 0; i < phases.length; i++) {
            if (count <= phases[i]) { idx = i; break; }
            idx = i;
        }
        return idx;
    }
    function getPhaseLabel(count) {
        const labels = ['100 Winners', '150 Winners', '200 Winners', '250 Winners', '500 Winners'];
        return labels[getPhase(count)] || labels[labels.length-1];
    }
    function getNextPhase(count) {
        const phases = [100, 150, 200, 250, 500];
        const idx = getPhase(count);
        return idx + 1 < phases.length ? phases[idx + 1] : null;
    }
    function getPhaseArrow(count) {
        const phases = [100, 150, 200, 250, 500];
        let arrow = '';
        const idx = getPhase(count);
        for (let i = 0; i < phases.length; i++) {
            if (i === idx) arrow += '➡️ ' + phases[i];
            else arrow += ' ' + phases[i];
            if (i < phases.length - 1) arrow += ' ➜';
        }
        return arrow;
    }
    function getNextWithdrawalDate() {
        const d = new Date();
        let month = d.getMonth(), year = d.getFullYear(), day = 30;
        if (d.getDate() > 30) { month++; if (month > 11) { month = 0; year++; } }
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return day + ' ' + months[month] + ' ' + year;
    }

    function renderHome() {
        const users = getUsers();
        const pool = getPool();
        const count = users.length;
        document.getElementById('homePlayers').textContent = count;
        document.getElementById('homePool').textContent = '₨ ' + pool.toFixed(0);
        document.getElementById('homeWinners').textContent = Math.min(count, 500);
        document.getElementById('phaseTitle').textContent = '🏆 Phase ' + (getPhase(count)+1) + ' – ' + getPhaseLabel(count);
        const next = getNextPhase(count);
        document.getElementById('phaseDesc').textContent = next ? 'Next: ' + next + ' Winners' : '🎉 Final Phase!';
        document.getElementById('phaseDate').textContent = '📅 Next Withdrawal: ' + getNextWithdrawalDate();
        document.getElementById('phaseArrow').textContent = getPhaseArrow(count);
    }

    document.getElementById('homePlayBtn').addEventListener('click', function() {
        const adLink = getAdLink('bs_ad_play');
        if (adLink) { window.open(adLink, '_blank'); }
        setTimeout(() => { window.location.href = 'game.html'; }, 300);
    });

    if (window.location.search.includes('admin=true')) {
        document.getElementById('adminNavLink').style.display = 'flex';
    }

    renderHome();
    setInterval(renderHome, 60000);
</script>
</body>
</html>
